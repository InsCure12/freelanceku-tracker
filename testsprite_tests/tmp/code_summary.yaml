version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16.2.3 (App Router)
  - Tailwind CSS v4
  - Recharts
  - "@react-pdf/renderer"
  - Drizzle ORM (SQLite)
  - Better Auth
  - Lucide React Icons
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Landing page with hero, features, pricing, and CTA buttons
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Email/password login page
  - path: /register
    file: src/app/register/page.tsx
    auth_required: false
    description: Email/password registration page
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: true
    description: Main dashboard overview with income stats, charts, recent jobs
  - path: /dashboard/work-log
    file: src/app/dashboard/work-log/page.tsx
    auth_required: true
    description: Work log listing all jobs with filters and pagination
  - path: /dashboard/work-log/new
    file: src/app/dashboard/work-log/new/page.tsx
    auth_required: true
    description: Form to create a new job entry
  - path: /dashboard/clients
    file: src/app/dashboard/clients/page.tsx
    auth_required: true
    description: Client directory aggregated from jobs
  - path: /dashboard/invoices
    file: src/app/dashboard/invoices/page.tsx
    auth_required: true
    description: Invoice list with status tracking and payment management (Pro)
  - path: /dashboard/invoices/new
    file: src/app/dashboard/invoices/new/page.tsx
    auth_required: true
    description: Create new invoice by selecting billable jobs (Pro)
  - path: /dashboard/tax-planner
    file: src/app/dashboard/tax-planner/page.tsx
    auth_required: true
    description: Tax planning dashboard with income breakdown (Pro)
  - path: /dashboard/settings
    file: src/app/dashboard/settings/page.tsx
    auth_required: true
    description: User profile and business settings
features:
  - name: User Registration
    description: Create account with name, email, and password. Auto-seeds default categories on success.
    files:
      - src/app/register/page.tsx
      - src/app/api/auth/[...all]/route.ts
      - src/app/api/categories/seed/route.ts
    entry_route: /register
    user_interactions:
      - Fill full name input
      - Fill email input
      - Fill password input (minimum 8 characters)
      - Click Create Account button
      - See error message on validation failure
      - Redirect to /dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-up/email
      - method: POST
        endpoint: /api/categories/seed
    auth_required: false
  - name: User Login
    description: Login with email and password credentials
    files:
      - src/app/login/page.tsx
      - src/app/api/auth/[...all]/route.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign In button
      - See error message on invalid credentials
      - Redirect to /dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-in/email
    auth_required: false
  - name: Dashboard Overview
    description: View monthly income totals, job counts, category breakdown, and recent jobs with search and month filter
    files:
      - src/app/dashboard/page.tsx
      - src/app/dashboard/ProDashboard.tsx
      - src/app/dashboard/FreeDashboard.tsx
      - src/components/CurrencyToggle.tsx
      - src/components/SearchProvider.tsx
    entry_route: /dashboard
    user_interactions:
      - Select month using month picker
      - Click Whole Year toggle button
      - Toggle currency between IDR and USD
      - Search jobs by client or project name via TopNav search
      - View income hero card with total amount
      - View recent jobs list
      - Click FAB to add new job
    api_calls:
      - method: GET
        endpoint: /api/jobs
    auth_required: true
  - name: Create New Job
    description: Register a new freelance engagement with client details, financial valuation, and status
    files:
      - src/app/dashboard/work-log/new/page.tsx
      - src/app/dashboard/work-log/new/NewJobForm.tsx
    entry_route: /dashboard/work-log/new
    user_interactions:
      - Fill client name (required)
      - Fill project name
      - Select start date
      - Select deadline date
      - Select category from dropdown
      - Write scope of work description
      - Select status (pending, ongoing, or done)
      - Enter contract amount
      - Select currency (IDR/USD)
      - Enter duration hours (Pro only)
      - Click Save Engagement button
      - Click Discard Draft to cancel
    api_calls:
      - method: POST
        endpoint: /api/jobs
    auth_required: true
  - name: Work Log Management
    description: View, filter, and manage all job entries with pagination and CSV export
    files:
      - src/app/dashboard/work-log/page.tsx
      - src/app/dashboard/work-log/WorkLogClient.tsx
      - src/components/StatusDropdown.tsx
      - src/components/JobActions.tsx
      - src/components/EditJobModal.tsx
    entry_route: /dashboard/work-log
    user_interactions:
      - Filter jobs by month dropdown
      - Filter jobs by category dropdown
      - Filter jobs by status dropdown
      - Click Export CSV button to download
      - Click New Entry button to add job
      - Change job status via status dropdown in table
      - Click edit button on job row to open edit modal
      - Click delete button on job row with confirmation
      - Navigate pages with pagination controls
    api_calls:
      - method: GET
        endpoint: /api/jobs
      - method: PATCH
        endpoint: /api/jobs/[id]
      - method: DELETE
        endpoint: /api/jobs/[id]
    auth_required: true
  - name: Client Directory
    description: Aggregated client view from jobs showing revenue, job counts, and activity
    files:
      - src/app/dashboard/clients/ClientsClient.tsx
    entry_route: /dashboard/clients
    user_interactions:
      - Search clients by name
      - Toggle currency display between IDR and USD
      - Export CSV of client data
      - Navigate pages with pagination
    api_calls:
      - method: GET
        endpoint: /api/clients
    auth_required: true
  - name: Invoice Management
    description: View, create, and manage invoices with payment tracking and PDF generation (Pro only)
    files:
      - src/app/dashboard/invoices/page.tsx
      - src/app/dashboard/invoices/InvoicesClient.tsx
      - src/components/InvoicePDF.tsx
    entry_route: /dashboard/invoices
    user_interactions:
      - View invoice stats cards (receivables, aging, paid)
      - Click Create Invoice button
      - Click Mark as Paid to open payment modal
      - Fill payment amount, date, and notes in modal
      - Click Confirm Payment button
      - Click Download PDF button on invoice row
      - Change invoice status (draft to sent)
      - Export CSV of invoices
      - Navigate pages with pagination
    api_calls:
      - method: GET
        endpoint: /api/invoices
      - method: PATCH
        endpoint: /api/invoices/[id]
      - method: GET
        endpoint: /api/invoices/[id]
    auth_required: true
  - name: Create Invoice
    description: Generate invoice by selecting billable jobs, setting tax/discount, and previewing PDF
    files:
      - src/app/dashboard/invoices/new/page.tsx
      - src/app/dashboard/invoices/new/CreateInvoiceForm.tsx
      - src/components/InvoicePDF.tsx
    entry_route: /dashboard/invoices/new
    user_interactions:
      - Select client from dropdown
      - Check/uncheck jobs to include as line items
      - Set tax rate percentage
      - Set flat discount amount
      - Set due date
      - View auto-calculated live total in sidebar
      - Click Generate and Send button
      - Click Preview PDF button
      - Click Save as Draft button
    api_calls:
      - method: POST
        endpoint: /api/invoices
    auth_required: true
  - name: User Settings
    description: Update profile information, business details, and manage subscription plan
    files:
      - src/app/dashboard/settings/page.tsx
      - src/app/dashboard/settings/SettingsClient.tsx
    entry_route: /dashboard/settings
    user_interactions:
      - Edit full name
      - Edit company name
      - Edit tax ID
      - Select default currency
      - Edit business address
      - Click Save Architect Profile button
      - Click Upgrade to Pro button (free tier)
      - Click Discard Changes button
    api_calls:
      - method: PATCH
        endpoint: /api/settings
      - method: POST
        endpoint: /api/settings/upgrade
    auth_required: true
  - name: Landing Page Navigation
    description: Public landing page with navigation to features, pricing, login, and registration
    files:
      - src/app/page.tsx
      - src/components/HeroChart.tsx
      - src/components/AnimateOnScroll.tsx
    entry_route: /
    user_interactions:
      - Click Get Started button to navigate to /register
      - Click Log In link to navigate to /login
      - Click See Pro Features to scroll to pricing
      - View feature cards section
      - View pricing comparison (Free vs Pro)
      - Read FAQ accordion items
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Upgrade to Pro is simulated with no real payment gateway
    location: src/app/api/settings/upgrade/route.ts
    impact: Upgrade immediately changes plan to pro without billing
  - issue: Exchange rate is hardcoded at 15745 IDR/USD
    location: src/lib/currency.ts
    impact: Currency conversions do not reflect real-time rates
  - issue: Notification badge counts computed server-side on each layout render
    location: src/app/dashboard/layout.tsx
    impact: Notifications only update on page navigation, not in real-time
